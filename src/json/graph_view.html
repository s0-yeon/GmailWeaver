<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <!-- 공유 렌더링 함수 (graph-viz.js와 동일한 로직) -->
  <script src="/graph-render.js"></script>
</head>
<body>
  <svg id="graph" style="width:100vw;height:100vh;"></svg>
  <script>
    fetch(window.location.origin + '/graph-data')
      .then(function(res) { return res.json(); })
      .then(function(data) {
        renderGraph(document.getElementById('graph'), data);
      })
      .catch(function(err) { console.error('그래프 로드 실패:', err); });
  </script>
</body>
</html>
