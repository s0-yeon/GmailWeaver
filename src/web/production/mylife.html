    <style>
      .site_title_text{font-size:1.2rem;font-weight:700;color:#fff;text-decoration:none;display:flex;align-items:center;gap:8px}
      .left_col,.nav_title{display:none!important}
      .right_col{margin-left:0!important;background:#f5f7f6;display:flex;align-items:center;justify-content:center;height:calc(100vh - 60px);overflow:hidden}
      .top_nav{margin-left:0!important}
      .nav.toggle{display:none!important}
      footer{display:none!important}
      html,body{overflow:hidden;height:100%}
      .container.body,.main_container{overflow:hidden;height:100%}

      .gw-top-links{display:flex;align-items:center;gap:2px;margin-left:16px}
      .gw-tl{display:inline-flex;align-items:center;padding:6px 14px;border-radius:6px;font-size:.88rem;font-weight:500;color:#73879C;text-decoration:none;border:none;background:transparent;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap;font-family:inherit;line-height:1.4}
      .gw-tl:hover{background:#f4f6f8;color:#2A3F54;text-decoration:none}
      .gw-tl.active{color:#26B99A;font-weight:700;background:#e8f7f4}
      .gw-tl-dropdown{position:relative}
      .gw-tl-dd-menu{display:none;position:absolute;top:100%;left:0;padding-top:6px;background:#fff;border:1px solid #e0e0e0;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:9999;min-width:140px;padding-bottom:6px}
      .gw-tl-dropdown:hover .gw-tl-dd-menu{display:block}
      .gw-tl-dd-menu a{display:block;padding:8px 16px;font-size:.84rem;color:#2A3F54;text-decoration:none}
      .gw-tl-dd-menu a:hover{background:#f4f6f8;color:#26B99A}
      @media(max-width:900px){.gw-top-links{display:none}}

      /* ── 페이지 ── */
      .ml-page{
        max-width:1100px;width:100%;margin:0 auto;
        padding:80px 48px 60px;
        display:flex;flex-direction:column;
      }

      .ml-header{margin-bottom:52px}
      .ml-title{font-size:3rem;font-weight:800;color:#1b2e22;letter-spacing:-.04em;line-height:1.1}
      .ml-title span{color:#1a9e6e}
      .ml-sub{margin-top:12px;font-size:1rem;color:#73879C}

      /* ── 카드 그리드 ── */
      .ml-grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:32px;
        align-items:stretch;
      }

      .ml-card{
        background:#fff;
        border:1.5px solid #e3ede8;
        border-radius:24px;
        padding:64px 52px 56px;
        text-decoration:none;
        color:inherit;
        display:flex;flex-direction:column;
        gap:24px;
        min-height:420px;
        transition:border-color .2s, box-shadow .2s, transform .2s;
        cursor:pointer;
        position:relative;
        overflow:hidden;
      }
      .ml-card::before{
        content:'';
        position:absolute;inset:0;
        background:linear-gradient(135deg, rgba(26,158,110,.04) 0%, transparent 60%);
        pointer-events:none;
      }
      .ml-card:hover{
        border-color:#1a9e6e;
        box-shadow:0 8px 32px rgba(26,158,110,.12);
        transform:translateY(-3px);
        text-decoration:none;
        color:inherit;
      }

      .ml-card-icon{
        width:64px;height:64px;
        background:#e8f7f1;
        border-radius:18px;
        display:flex;align-items:center;justify-content:center;
        font-size:1.8rem;
      }
      .ml-card-title{
        font-size:1.9rem;font-weight:800;color:#1b2e22;
        letter-spacing:-.03em;
      }
      .ml-card-title span{color:#1a9e6e}
      .ml-card-desc{
        font-size:.92rem;color:#73879C;line-height:1.7;
        flex:1;
      }
      .ml-card-arrow{
        font-size:.85rem;color:#b0c4bc;font-weight:600;
        letter-spacing:.04em;
        display:flex;align-items:center;gap:6px;
        margin-top:8px;
        transition:color .15s,gap .15s;
      }
      .ml-card:hover .ml-card-arrow{color:#1a9e6e;gap:10px}
    </style>
  </head>
