    <style>
      .site_title_text{font-size:1.2rem;font-weight:700;color:#fff;text-decoration:none;display:flex;align-items:center;gap:8px}
      .left_col,.nav_title{display:none!important}
      .right_col{margin-left:0!important;background:#f5f7f6}
      .top_nav{margin-left:0!important}
      .nav.toggle{display:none!important}
      footer{display:none!important}

      .gw-top-links{display:flex;align-items:center;gap:2px;margin-left:16px}
      .gw-tl{display:inline-flex;align-items:center;padding:6px 14px;border-radius:6px;font-size:.88rem;font-weight:500;color:#73879C;text-decoration:none;border:none;background:transparent;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap;font-family:inherit;line-height:1.4}
      .gw-tl:hover{background:#f4f6f8;color:#2A3F54;text-decoration:none}
      .gw-tl.active{color:#26B99A;font-weight:700;background:#e8f7f4}
      .gw-tl-dropdown{position:relative}
      .gw-tl-dd-menu{display:none;position:absolute;top:100%;left:0;padding-top:6px;background:#fff;border:1px solid #e0e0e0;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:9999;min-width:140px;padding:6px 0}
      .gw-tl-dropdown:hover .gw-tl-dd-menu{display:block}
      .gw-tl-dd-menu a{display:block;padding:8px 16px;font-size:.84rem;color:#2A3F54;text-decoration:none}
      .gw-tl-dd-menu a:hover{background:#f4f6f8;color:#26B99A}
      @media(max-width:900px){.gw-top-links{display:none}}

      /* ── 페이지 ── */
      .mt-page{max-width:1200px;margin:0 auto;padding:28px 40px 32px}

      /* 헤더 */
      .mt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
      .mt-title{font-size:2.6rem;font-weight:800;color:#1b2e22;letter-spacing:-.04em}
      .mt-title span{color:#1a9e6e}
      .mt-mode-toggle{display:flex;gap:3px;background:#e9efec;border-radius:8px;padding:3px}
      .mt-mode-btn{padding:6px 18px;border-radius:6px;border:none;font-size:.82rem;font-weight:600;cursor:pointer;background:transparent;color:#73879C;transition:all .15s;font-family:inherit}
      .mt-mode-btn.active{background:#fff;color:#1a9e6e;box-shadow:0 1px 4px rgba(0,0,0,.08)}

      /* ── 메인 카드 ── */
      .mt-main{
        background:#fff;border-radius:16px;border:1px solid #e3ede8;
        padding:36px 52px 32px;margin-bottom:12px;
        display:flex;flex-direction:column;
        height:calc(100vh - 360px); /* 네비(56) + 페이지패딩(96) + 헤더(80) + 포인터카드(100) + 여유 */
        min-height:320px;
        max-height:600px;
      }

      /* 타임라인 트랙 */
      .mt-track{
        display:flex;
        align-items:flex-start;
        justify-content:space-between;
        position:relative;
      }
      /* 선 */
      .mt-track::after{
        content:'';position:absolute;
        left:0;right:0;
        top:7px; /* 도트 절반 */
        height:1.5px;background:#e3ede8;
        z-index:0;
      }

      /* 노드 컬럼 */
      .mt-node-col{
        display:flex;flex-direction:column;align-items:center;
        position:relative;z-index:1;
        cursor:pointer;
        flex:1;
      }

      /* 도트 */
      .mt-dot{
        width:14px;height:14px;border-radius:50%;
        background:#a8c4ba;border:2px solid #fff;
        box-shadow:0 0 0 1.5px #8fb5a9;
        transition:background .18s,box-shadow .18s,transform .18s;
        flex-shrink:0;
      }
      .mt-node-col:hover .mt-dot,
      .mt-node-col.active .mt-dot{
        background:#1a9e6e;
        box-shadow:0 0 0 5px rgba(26,158,110,.28);
        transform:scale(1.3);
      }
      /* 클릭으로 고정된 노드 */
      .mt-node-col.pinned .mt-dot{
        background:#14845c;
        box-shadow:0 0 0 6px rgba(20,132,92,.32);
        transform:scale(1.4);
      }
      .mt-node-col.pinned .mt-node-label{color:#14845c;font-weight:800}
      .mt-node-col.pinned .mt-node-count{color:#14845c}

      /* 기간 레이블 */
      .mt-node-label{
        margin-top:10px;
        font-size:.76rem;font-weight:700;color:#73879C;
        white-space:nowrap;letter-spacing:.02em;
        transition:color .15s;
      }
      .mt-node-col:hover .mt-node-label,
      .mt-node-col.active .mt-node-label{color:#1a9e6e}

      /* 메일 수 */
      .mt-node-count{
        margin-top:3px;
        font-size:.7rem;color:#a8c4ba;font-weight:500;
        transition:color .15s;
      }
      .mt-node-col:hover .mt-node-count,
      .mt-node-col.active .mt-node-count{color:#1a9e6e}

      /* ── 인포 패널 (노드 아래, 고정 높이) ── */
      .mt-info-area{
        margin-top:32px;
        flex:1;
        position:relative;
        min-height:0;
        overflow:hidden;
      }
      .mt-panel{
        position:absolute;inset:0;
        background:#f0f8f4;
        border:1.5px solid #a8d9c0;
        border-radius:14px;
        padding:20px 28px;
        box-sizing:border-box;
        opacity:0;
        transform:translateY(5px);
        transition:opacity .2s,transform .2s;
        pointer-events:none;
        overflow-y:auto;
      }
      .mt-panel.show{
        opacity:1;
        transform:translateY(0);
        pointer-events:auto;
      }
      /* 고정됐을 때 테두리 강조 */
      .mt-panel.pinned{
        border-color:#1a9e6e;
        box-shadow:0 0 0 3px rgba(26,158,110,.1);
      }
      .mt-panel-top{display:flex;align-items:baseline;gap:16px;margin-bottom:12px}
      .mt-panel-period{font-size:.82rem;font-weight:800;color:#1a9e6e;letter-spacing:.04em}
      .mt-panel-count{font-size:.8rem;color:#73879C;font-weight:500}
      .mt-panel-count strong{color:#1b2e22;font-size:1rem;font-weight:700}
      .mt-panel-summary{font-size:.84rem;color:#2A3F54;line-height:1.75;margin-bottom:14px}
      .mt-panel-contacts-title{font-size:.68rem;font-weight:700;color:#8fb5a9;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:7px}
      .mt-panel-contacts{display:flex;flex-wrap:wrap;gap:6px}
      .mt-panel-contact{font-size:.75rem;color:#4f6358;background:#dff0e8;border-radius:20px;padding:3px 11px;font-weight:500}

      /* ── 포인터 라인 ── */
      .mt-pointer-wrap{background:#fff;border-radius:12px;border:1px solid #e3ede8;padding:20px 52px 16px}
      .mt-pointer-label{font-size:.66rem;font-weight:600;color:#8fb5a9;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}
      .mt-pointer-track{position:relative;height:20px;cursor:pointer;user-select:none}
      .mt-pointer-bg{position:absolute;left:0;right:0;top:50%;height:2px;background:#c0d4cc;transform:translateY(-50%)}
      .mt-pointer-window{position:absolute;top:50%;height:4px;transform:translateY(-50%);background:rgba(26,158,110,.52);border-radius:2px;pointer-events:none;transition:left .2s,width .2s}
      .mt-pointer-cursor{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:#1a9e6e;border:2px solid #fff;box-shadow:0 0 0 3px rgba(26,158,110,.3);pointer-events:none;transition:left .2s;z-index:3}
      .mt-pm{position:absolute;top:50%;transform:translate(-50%,-50%);width:7px;height:7px;border-radius:50%;background:#8fb5a9;z-index:2;cursor:pointer;transition:transform .12s,background .12s}
      .mt-pm:hover{transform:translate(-50%,-50%) scale(1.8);background:#1a9e6e}
      .mt-pointer-axis{position:relative;height:16px;margin-top:4px}
      .mt-pa-lbl{position:absolute;transform:translateX(-50%);font-size:.65rem;color:#8fb5a9;font-weight:600}
    </style>
  </head>

    <script>
    (function () {
      /* ════════════════════════════

      ════════════════════════════ */
      const MONTH_DATA = {
        '2024-01': { count:182, threads:43, summary:'새해 프로젝트 킥오프와 관련된 대화가 집중됐습니다. OKR 수립과 예산 협의, 팀 구성이 주요 주제였으며 외부 파트너와의 초기 미팅도 다수 있었습니다.', contacts:['김민준 (팀장)','이서연 (기획)','박지호 (개발)'] },
        '2024-02': { count:97,  threads:28, summary:'상대적으로 조용한 한 달이었습니다. 팀빌딩 행사 준비와 내부 계획서 검토가 주를 이뤘고, 발렌타인 전후로 개인 일정 관련 메일이 소소하게 오갔습니다.', contacts:['이서연 (기획)','최현우 (디자인)'] },

        '2025-10': { count:201, threads:51, summary:'이노베이터 100 선정 이후 강연·인터뷰 섭외 메일이 쏟아졌습니다. 네트워킹 행사 참여 관련 외부 메일이 평소보다 두 배 가까이 증가했습니다.', contacts:['주최측','기자','이서연 (기획)','한소희 (커뮤니티)'] },

        '2025-12': { count:112, threads:27, summary:'2025 연말 결산과 시리즈B 준비 착수가 주요 주제였습니다. 팀 회식 일정 조율과 VC와의 비공식 대화 메일이 섞여 있었습니다.', contacts:['김민준 (팀장)','이서연 (기획)','VC 담당자'] },

        '2026-02': { count:81,  threads:19, summary:'팀 스노보드 워크샵과 Q1 준비가 주요 내용이었습니다. 내부 소통 위주로 메일 수가 낮게 유지됐습니다.', contacts:['이서연 (기획)','최현우 (디자인)'] },
        '2026-03': { count:129, threads:31, summary:'필라테스 시작과 함께 재활 관련 개인 일정 메일이 일부 있었습니다. Q1 마감 성과 집계와 팀 내 업무 조율이 주를 이뤘습니다.', contacts:['정유진 (HR)','박지호 (개발)'] },
        '2026-04': { count:321, threads:82, summary:'MAU 5만 돌파와 글로벌 진출 선언으로 역대 최다 메일을 기록했습니다. 해외 파트너 협의, 대규모 채용 공고, 언론 대응이 동시에 몰렸습니다.', contacts:['김민준 (팀장)','이서연 (기획)','해외 파트너','마케팅팀'] },
        '2026-05': { count:73,  threads:17, summary:'발리 여행 중 메일을 최소화했습니다. 복귀 후 처리할 업무 인계 메일만 간략히 오갔습니다.', contacts:['이서연 (기획)'] },
        '2026-06': { count:198, threads:49, summary:'AI 기능 정식 출시로 사용자 반응과 버그 리포트가 쏟아졌습니다. 언론 보도 대응과 커뮤니티 관리 메일이 집중됐으며 개발팀 내부 긴급 논의도 많았습니다.', contacts:['박지호 (개발)','신재원 (신입)','한소희 (커뮤니티)','기자'] },
      };

      const ALL_KEYS   = Object.keys(MONTH_DATA).sort();
      const YEAR_KEYS  = [...new Set(ALL_KEYS.map(k => k.slice(0,4)))].sort();
      const YEAR_DATA  = {};
      YEAR_KEYS.forEach(y => {
        const months = ALL_KEYS.filter(k => k.startsWith(y));
        const total  = months.reduce((s,k) => s + MONTH_DATA[k].count, 0);
        const threads= months.reduce((s,k) => s + MONTH_DATA[k].threads, 0);
        // 가장 바쁜 달의 요약을 대표로
        const peak   = months.sort((a,b)=>MONTH_DATA[b].count-MONTH_DATA[a].count)[0];
        const contacts= [...new Set(months.flatMap(k=>MONTH_DATA[k].contacts))].slice(0,4);
        YEAR_DATA[y] = {
          count:total, threads,
          summary: `${y}년 전체 ${total.toLocaleString()}건의 메일이 오갔습니다. 가장 활발했던 달은 ${peak}월이었으며, ${MONTH_DATA[peak].summary}`,
          contacts
        };
      });

      /* ── 포인터 전체 범위 ── */
      const FIRST_NUM = monthToNum(ALL_KEYS[0]);
      const LAST_NUM  = monthToNum(ALL_KEYS[ALL_KEYS.length-1]);
      const TOTAL     = LAST_NUM - FIRST_NUM;

      function monthToNum(k) { const [y,m]=k.split('-').map(Number); return y*12+m; }
      function monthToPct(k) { return (monthToNum(k)-FIRST_NUM)/TOTAL; }
      function yearToPct(y)  { return (Number(y)*12+1-FIRST_NUM)/TOTAL; }

      /* ── 상태 ── */
      let mode = 'month';
      let centerIdx = 2; // ALL_KEYS index (월별) or YEAR_KEYS index (년별)
      let pinnedKey = null; // 클릭으로 고정된 키

      const WIN = { month:8, year:5 };

      function getWindowKeys() {
        const keys = mode==='month' ? ALL_KEYS : YEAR_KEYS;
        const win  = WIN[mode];
        let start = Math.max(0, centerIdx - Math.floor(win/2));
        start = Math.min(start, keys.length - win);
        start = Math.max(0, start);
        return keys.slice(start, start + win);
      }

      /* ── 렌더 ── */
      function render() {
        const keys = getWindowKeys();
        const data = mode==='month' ? MONTH_DATA : YEAR_DATA;
        const track = document.getElementById('track');
        track.innerHTML = '';
        pinnedKey = null;
        document.getElementById('infoPanel').classList.remove('pinned');
        hidePanel();

        keys.forEach((k) => {
          const d = data[k];
          if (!d) return;

          const col = document.createElement('div');
          col.className = 'mt-node-col';
          col.dataset.key = k;

          const dot = document.createElement('div');
          dot.className = 'mt-dot';

          const lbl = document.createElement('div');
          lbl.className = 'mt-node-label';
          lbl.textContent = mode==='month'
            ? `${k.slice(0,4)}.${k.slice(5)}`
            : `${k}년`;

          const cnt = document.createElement('div');
          cnt.className = 'mt-node-count';
          cnt.textContent = `${d.count.toLocaleString()}건`;

          col.appendChild(dot);
          col.appendChild(lbl);
          col.appendChild(cnt);
          track.appendChild(col);

          col.addEventListener('mouseenter', () => { if (!pinnedKey) showPanel(col, k, d); });
          col.addEventListener('mouseleave', () => { if (!pinnedKey) hidePanel(); });
          col.addEventListener('click', () => {
            if (pinnedKey === k) {
              // 같은 노드 재클릭 → 고정 해제
              pinnedKey = null;
              col.classList.remove('pinned');
              document.getElementById('infoPanel').classList.remove('pinned');
              hidePanel();
            } else {
              // 새 노드 클릭 → 고정
              pinnedKey = k;
              document.querySelectorAll('.mt-node-col').forEach(c => c.classList.remove('pinned'));
              col.classList.add('pinned');
              showPanel(col, k, d);
              document.getElementById('infoPanel').classList.add('pinned');
            }
          });
        });

        updatePointerWindow();
      }

      /* ── 인포 패널 ── */
      function showPanel(col, key, d) {
        document.querySelectorAll('.mt-node-col').forEach(c => c.classList.toggle('active', c===col));

        document.getElementById('panelPeriod').textContent =
          mode==='month' ? `${key.slice(0,4)}년 ${key.slice(5)}월` : `${key}년`;
        document.getElementById('panelCount').innerHTML =
          `<strong>${d.count.toLocaleString()}</strong>건 &nbsp;·&nbsp; ${d.threads}개 대화`;
        document.getElementById('panelSummary').textContent = d.summary;

        const cc = document.getElementById('panelContacts');
        cc.innerHTML = '';
        d.contacts.forEach(c => {
          const el = document.createElement('div');
          el.className = 'mt-panel-contact';
          el.textContent = c;
          cc.appendChild(el);
        });

        document.getElementById('infoPanel').classList.add('show');
      }

      function hidePanel() {
        document.getElementById('infoPanel').classList.remove('show');
        document.querySelectorAll('.mt-node-col').forEach(c=>c.classList.remove('active'));
      }

      /* ── 모드 토글 ── */
      document.querySelectorAll('.mt-mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          mode = btn.dataset.mode;
          centerIdx = mode==='month' ? 3 : 0;
          document.querySelectorAll('.mt-mode-btn').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          render();
          updatePointerCursor();
        });
      });

      /* ── 포인터 ── */
      function buildPointer() {
        const track = document.getElementById('pointerTrack');
        track.querySelectorAll('.mt-pm').forEach(el=>el.remove());

        ALL_KEYS.forEach((k, idx) => {
          const pm = document.createElement('div');
          pm.className = 'mt-pm';
          pm.style.left = `${monthToPct(k)*100}%`;
          pm.addEventListener('click', e => {
            e.stopPropagation();
            centerIdx = mode==='month' ? idx : Math.floor(idx/(ALL_KEYS.length/YEAR_KEYS.length));
            centerIdx = Math.max(0, Math.min(
              (mode==='month' ? ALL_KEYS : YEAR_KEYS).length - 1, centerIdx));
            updatePointerCursor(); render();
          });
          track.insertBefore(pm, document.getElementById('pointerWindow'));
        });

        const axis = document.getElementById('pointerAxis');
        axis.innerHTML = '';
        YEAR_KEYS.forEach(y => {
          const pct = Math.max(0, Math.min(98, yearToPct(y)*100));
          const lbl = document.createElement('div');
          lbl.className = 'mt-pa-lbl';
          lbl.textContent = y;
          lbl.style.left = pct+'%';
          axis.appendChild(lbl);
        });

        updatePointerCursor();
        updatePointerWindow();
      }

      function updatePointerCursor() {
        const keys = mode==='month' ? ALL_KEYS : YEAR_KEYS;
        const k = keys[Math.max(0,Math.min(keys.length-1,centerIdx))];
        const pct = mode==='month' ? monthToPct(k)*100 : yearToPct(k)*100;
        document.getElementById('pointerCursor').style.left = Math.max(0,Math.min(100,pct))+'%';
      }

      function updatePointerWindow() {
        const wKeys = getWindowKeys();
        if (!wKeys.length) return;
        const s = mode==='month' ? monthToPct(wKeys[0]) : yearToPct(wKeys[0]);
        const e = mode==='month' ? monthToPct(wKeys[wKeys.length-1]) : yearToPct(wKeys[wKeys.length-1]) + 12/TOTAL;
        const win = document.getElementById('pointerWindow');
        win.style.left  = `${Math.max(0,s*100)}%`;
        win.style.width = `${Math.min(100,(e-s)*100)}%`;
      }

      document.getElementById('pointerTrack').addEventListener('click', e => {
        if (e.target.classList.contains('mt-pm')) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const pct  = (e.clientX - rect.left) / rect.width;
        const totalIdx = Math.round(pct * ALL_KEYS.length);
        if (mode==='month') {
          centerIdx = Math.max(0, Math.min(ALL_KEYS.length-1, totalIdx));
        } else {
          centerIdx = Math.max(0, Math.min(YEAR_KEYS.length-1, Math.floor(totalIdx / (ALL_KEYS.length/YEAR_KEYS.length))));
        }
        updatePointerCursor(); render();
      });

      /* ── 초기화 ── */
      buildPointer();
      render();
    })();
    </script>
