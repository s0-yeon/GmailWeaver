# ================================================================
#  GmailWeaver — settings.yaml (오류 수정 + 인덱싱 속도 최적화)
#  변경 요약은 주석으로 표시
# ================================================================

encoding_model: cl100k_base

# ── [수정] 레거시 llm: 블록 완전 제거 → models: 블록으로 통합 ──
models:
  default_chat_model:
    type: openai_chat
    model: gpt-4o-mini
    api_key: ${GRAPHRAG_API_KEY}
    model_supports_json: true

  default_embedding_model:
    type: openai_embedding
    model: text-embedding-3-small
    api_key: ${GRAPHRAG_API_KEY}

# ── [최적화] 병렬 처리 활성화 ──
parallelization:
  stagger: 0.05       # 0.3 → 0.1: API 요청 간격 단축
  num_threads: 25    # 주석 해제: 병렬 스레드 가동

async_mode: threaded

# ── [수정] embeddings.llm 중복 제거, vector_store만 유지 ──
embeddings:
  async_mode: threaded
  vector_store:
    type: lancedb
    db_uri: 'output/lancedb'
    container_name: default
    overwrite: true

# ── Input ──
input:
  type: file
  file_type: text
  base_dir: "input"
  file_encoding: utf-8
  file_pattern: ".*\\.txt$$"

# ── [최적화] 청크 크기 이메일 특성에 맞게 축소 ──
chunks:
  size: 900         # 4000 → 1200: 이메일 단위 자연 분리
  overlap: 100       # 200 → 100
  group_by_columns: [id]

# ── Storage ──
cache:
  type: file
  base_dir: "cache"

reporting:
  type: file
  base_dir: "logs"

storage:
  type: file
  base_dir: "output"

update_index_storage:
  # type: file
  # base_dir: "update_output"

# ── Workflow ──
skip_workflows: []

# ── [최적화] entity 타입 축소, max_gleanings 제거 ──
entity_extraction:
  prompt: "prompts/entity_extraction.txt"
  entity_types: [person, organization, EMAIL_SENDER, EMAIL_RECIPIENT, EMAIL_SUBJECT, DATE, DEADLINE, TOPIC]
  max_gleanings: 2  # 2pass extraction = 97% coverage

# ── [최적화] 요약 출력 토큰 절약 ──
summarize_descriptions:
  prompt: "prompts/summarize_descriptions.txt"
  max_length: 300    # 500 → 300

# ── Claim (비활성, gleanings도 0으로 정리) ──
claim_extraction:
  enabled: false
  prompt: "prompts/claim_extraction.txt"
  description: "Any claims or facts that could be relevant to information discovery."
  max_gleanings: 0

# ── [최적화] community 리포트 토큰 축소 ──
community_reports:
  prompt: "prompts/community_report.txt"
  max_length: 800       # 2000 → 1200
  max_input_length: 5000  # 8000 → 5000

cluster_graph:
  max_cluster_size: 10

embed_graph:
  enabled: false

umap:
  enabled: false

# ── [최적화] 불필요한 스냅샷 저장 비활성화 ──
snapshots:
  graphml: false        # true → false
  raw_entities: false   # true → false
  top_level_nodes: false # true → false
  embeddings: false
  transient: false

# ── Query ──
# [수정] local_search 중복 제거, 유효한 필드명으로 단일 정의
local_search:
  prompt: "prompts/local_search_system_prompt.txt"
  text_unit_prop: 0.5
  max_context_tokens: 4000   # max_tokens(오류) → max_context_tokens(정확한 필드명)

global_search:
  map_prompt: "prompts/global_search_map_system_prompt.txt"
  reduce_prompt: "prompts/global_search_reduce_system_prompt.txt"
  knowledge_prompt: "prompts/global_search_knowledge_system_prompt.txt"

drift_search:
  prompt: "prompts/drift_search_system_prompt.txt"
