### This config file contains required core defaults that must be set, along with a handful of common optional settings.
### For a full list of available settings, see https://microsoft.github.io/graphrag/config/yaml/

### LLM settings ###
## There are a number of settings to tune the threading and token limits for LLM calls - check the docs.

encoding_model: cl100k_base

# ── 모델 설정 (레거시 llm: 블록 완전 제거, models: 로 통합) ──
models:				# ← 텍스트 생성용 (entity 추출, 요약, 리포트)
  default_chat_model:
    type: openai_chat
    model: gpt-4o-mini
    api_key: ${GRAPHRAG_API_KEY}
    model_supports_json: true

  default_embedding_model:		# ← 벡터화용 (LanceDB에 저장될 임베딩 생성)
    type: openai_embedding
    model: text-embedding-3-small
    api_key: ${GRAPHRAG_API_KEY}

# ── 병렬 처리 (속도 최적화 핵심) ──
parallelization:
  stagger: 0.1       # 0.3 → 0.1
  num_threads: 25    # 주석 해제

async_mode: threaded

# ── 임베딩 (embeddings.llm 중복 제거, vector_store만 유지) ──
embeddings:
  async_mode: threaded
  vector_store:
    type: lancedb
    db_uri: 'output/lancedb'
    container_name: default
    overwrite: true

# ── 입력 ──
input:
  type: file
  file_type: text
  base_dir: "input"
  file_encoding: utf-8
  file_pattern: ".*\\.txt$$"

# ── 청크 (이메일 특성에 맞게 축소) ──
chunks:
  size: 1200         # 4000 → 1200
  overlap: 100       # 200 → 100
  group_by_columns: [id]

# ── 스토리지 ──
cache:
  type: file
  base_dir: "cache"

reporting:
  type: file
  base_dir: "logs"

storage:
  type: file
  base_dir: "output"

update_index_storage:
  # type: file
  # base_dir: "update_output"

# ── 워크플로우 ──
skip_workflows: []

# ── 엔티티 추출 (LLM 호출 횟수 감소) ──
entity_extraction:
  prompt: "prompts/entity_extraction.txt"
  entity_types: [organization, person, event]  # geo 제거
  max_gleanings: 0   # 1 → 0

# ── 설명 요약 ──
summarize_descriptions:
  prompt: "prompts/summarize_descriptions.txt"
  max_length: 300    # 500 → 300

# ── 클레임 추출 (비활성) ──
claim_extraction:
  enabled: false
  prompt: "prompts/claim_extraction.txt"
  description: "Any claims or facts that could be relevant to information discovery."
  max_gleanings: 0

# ── 커뮤니티 리포트 ──
community_reports:
  prompt: "prompts/community_report.txt"
  max_length: 1200        # 2000 → 1200
  max_input_length: 5000  # 8000 → 5000

cluster_graph:
  max_cluster_size: 10

embed_graph:
  enabled: false

umap:
  enabled: false

# ── 스냅샷 (공식 스펙 필드명으로 수정) ──
snapshots:
  graphml: false       # true → false
  raw_graph: false     # raw_entities(오류) → raw_graph(공식 필드명)
  embeddings: false
  # top_level_nodes 제거 → 존재하지 않는 필드

# ── 쿼리 ──
local_search:
  prompt: "prompts/local_search_system_prompt.txt"
  text_unit_prop: 0.5
  max_context_tokens: 4000   # max_tokens(오류) → max_context_tokens

global_search:
  map_prompt: "prompts/global_search_map_system_prompt.txt"
  reduce_prompt: "prompts/global_search_reduce_system_prompt.txt"
  knowledge_prompt: "prompts/global_search_knowledge_system_prompt.txt"

drift_search:
  prompt: "prompts/drift_search_system_prompt.txt"
